name: Deploy Work2Cash Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify generated document registry
        run: node scripts/generate-document-registry.js --check

      - name: Verify generated Phase 2 flow inventory
        run: node scripts/generate-flow-migration-inventory.js --check

      - name: Verify all legacy flows have canonical Phase 2 sources
        run: node scripts/migrate-legacy-flow-sources.js --check

      - name: Verify generated Phase 2 flow documents
        run: node scripts/generate-flow-docs.js --check

      - name: Verify canonical contract decisions
        run: node scripts/generate-contract-docs.js --check

      - name: Verify the accepted referral contract decision
        run: node scripts/validate-referral-contract.js

      - name: Validate documentation metadata and navigation
        run: node scripts/validate-docs.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Verify document guards
        run: |
          if [ -f scripts/apply.guard.js ]; then
            node scripts/apply.guard.js
          else
            echo "No guard verification script found. Skipping."
          fi

      - name: Verify generated pilot documents
        run: node scripts/generate-pilot-docs.js --check

      - name: Prepare site folder
        run: |
          rm -rf _site
          mkdir -p _site

          cp index.html _site/

          if [ -f 404.html ]; then
            cp 404.html _site/
          fi

          if [ -f AGENTS.md ]; then
            cp AGENTS.md _site/
          fi

          if [ -d documents ]; then
            cp -R documents _site/
          fi

          if [ -d assets ]; then
            cp -R assets _site/
          fi

          touch _site/.nojekyll

      - name: Verify required site files
        run: |
          test -f _site/index.html

          if [ -f AGENTS.md ]; then
            test -f _site/AGENTS.md
          fi

          if [ -d documents ]; then
            while IFS= read -r file; do
              test -f "_site/$file"
            done < <(find documents -type f | sort)
          fi

          echo "Site files prepared for deployment:"
          find _site -maxdepth 5 -type f | sort

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
